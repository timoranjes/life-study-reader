<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .bg { fill: #f5f0e8; }
        .globe { fill: #2563eb; }
        .globe-lines { stroke: #ffffff; }
        .cross { fill: #ffffff; }
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1a1a2e; }
        .globe { fill: #3b82f6; }
        .globe-lines { stroke: #ffffff; }
        .cross { fill: #ffffff; }
      }
    </style>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect class="bg" width="512" height="512" rx="96"/>
  
  <!-- Globe circle -->
  <circle class="globe" cx="256" cy="256" r="180"/>
  
  <!-- Globe lines - latitude -->
  <ellipse class="globe-lines" cx="256" cy="256" rx="180" ry="70" stroke-width="8" fill="none" opacity="0.5"/>
  <ellipse class="globe-lines" cx="256" cy="256" rx="180" ry="130" stroke-width="8" fill="none" opacity="0.4"/>
  <line class="globe-lines" x1="76" y1="256" x2="436" y2="256" stroke-width="8" opacity="0.5"/>
  
  <!-- Globe lines - longitude -->
  <ellipse class="globe-lines" cx="256" cy="256" rx="70" ry="180" stroke-width="8" fill="none" opacity="0.5"/>
  <ellipse class="globe-lines" cx="256" cy="256" rx="130" ry="180" stroke-width="8" fill="none" opacity="0.4"/>
  
  <!-- Cross in center -->
  <g transform="translate(256, 256)">
    <!-- Vertical bar -->
    <rect class="cross" x="-20" y="-100" width="40" height="200" rx="8"/>
    <!-- Horizontal bar -->
    <rect class="cross" x="-70" y="-20" width="140" height="40" rx="8"/>
  </g>
</svg>