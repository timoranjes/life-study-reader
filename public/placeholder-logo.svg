<svg width="240" height="48" viewBox="0 0 240 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-bg { fill: #f5f0e8; }
      .logo-globe { fill: #2563eb; }
      .logo-lines { stroke: #ffffff; }
      .logo-cross { fill: #ffffff; }
      .logo-text { fill: #2563eb; }
      .logo-subtitle { fill: #666666; }
      @media (prefers-color-scheme: dark) {
        .logo-bg { fill: #1a1a2e; }
        .logo-globe { fill: #3b82f6; }
        .logo-text { fill: #3b82f6; }
        .logo-subtitle { fill: #999999; }
      }
    </style>
  </defs>
  
  <!-- Globe with Cross Icon -->
  <g transform="translate(0, 0)">
    <rect class="logo-bg" width="48" height="48" rx="10"/>
    <circle class="logo-globe" cx="24" cy="24" r="18"/>
    <ellipse class="logo-lines" cx="24" cy="24" rx="18" ry="7" stroke-width="1" fill="none" opacity="0.5"/>
    <ellipse class="logo-lines" cx="24" cy="24" rx="18" ry="13" stroke-width="1" fill="none" opacity="0.4"/>
    <line class="logo-lines" x1="6" y1="24" x2="42" y2="24" stroke-width="1" opacity="0.5"/>
    <ellipse class="logo-lines" cx="24" cy="24" rx="7" ry="18" stroke-width="1" fill="none" opacity="0.5"/>
    <ellipse class="logo-lines" cx="24" cy="24" rx="13" ry="18" stroke-width="1" fill="none" opacity="0.4"/>
    <g transform="translate(24, 24)">
      <rect class="logo-cross" x="-2" y="-10" width="4" height="20" rx="1"/>
      <rect class="logo-cross" x="-7" y="-2" width="14" height="4" rx="1"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="60" y="24" font-family="serif" font-size="20" font-weight="700" class="logo-text">生命读经</text>
  <text x="60" y="40" font-family="sans-serif" font-size="11" class="logo-subtitle">Life-Study Reader</text>
</svg>